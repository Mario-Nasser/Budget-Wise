<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Transactions</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .transaction-item {
      padding: 1rem;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .transaction-item.Expense { border-left: 4px solid var(--error); }
    .transaction-item.Income { border-left: 4px solid var(--success); }

    .category-badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: #ecfdf5;
      color: #065f46;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">Budget-Wise</div>
    <ul class="nav-links">
      <li><a href="index.html">Financial Goals</a></li>
      <li><a href="addTransaction.html" class="active">Transactions</a></li>
      <li><a href="report.html">Reports</a></li>
    </ul>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span id="nav-user-name" style="color: var(--text-muted); font-size: 0.875rem;"></span>
      <button onclick="handleLogout()" class="btn btn-primary" style="padding: 0.5rem 1rem;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="grid grid-2">
      <!-- Forms Section -->
      <div class="animate-fade-in">
        <!-- Add Category -->
        <div class="glass-card" style="padding: 2rem; margin-bottom: 2rem;">
          <h2 style="margin-bottom: 1.5rem;">Add Category</h2>
          <form id="categoryForm">
            <div class="form-group">
              <label>Category Name</label>
              <input type="text" id="catName" placeholder="e.g. Food" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="catType">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </div>
            <div class="form-group">
              <label>Monthly Spending Limit ($)</label>
              <input type="number" id="catLimit" step="0.01" placeholder="0.00 (Optional)">
              <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Set a monthly limit to receive warnings when you spend too much.</p>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Category</button>
          </form>
        </div>

        <!-- Add Transaction -->
        <div class="glass-card" style="padding: 2rem;">
          <h2 style="margin-bottom: 1.5rem;">New Transaction</h2>
          <form id="transactionForm">
            <div class="form-group">
              <label>Amount ($)</label>
              <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="type" onchange="updateCategories()">
                <option value="Expense">Expense</option>
                <option value="Income">Income</option>
              </select>
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="category" required>
                <option value="">Select Category</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="desc" placeholder="Optional notes">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Transaction</button>
          </form>
        </div>
      </div>

      <!-- History Section -->
      <div class="animate-fade-in" style="animation-delay: 0.1s;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2>Recent History</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button onclick="handleClearAll()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid var(--error);">Clear All Data</button>
            <button onclick="loadHistory()" class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);">Refresh</button>
          </div>
        </div>
        <div id="historyList">
          <p style="color: var(--text-muted);">Loading transactions...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'login.html';

    let allCategories = [];

    async function loadCategories() {
      try {
        const res = await api.transactions.categories.getAll();
        allCategories = res.data || [];
        updateCategories();
      } catch (err) {
        console.error('Error loading categories:', err);
      }
    }

    function updateCategories() {
      const type = document.getElementById('type').value.toLowerCase();
      const select = document.getElementById('category');
      const filtered = allCategories.filter(c => c.type === type);

      select.innerHTML = '<option value="">Select Category</option>';
      filtered.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c._id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
    }

    async function loadHistory() {
      const listEl = document.getElementById('historyList');
      try {
        const res = await api.transactions.getAll();
        const txs = res.data?.transactions || [];
        listEl.innerHTML = '';

        if (txs.length === 0) {
          listEl.innerHTML = '<p style="color: var(--text-muted);">No transactions found.</p>';
          return;
        }

        txs.forEach(t => {
          const item = document.createElement('div');
          item.className = `transaction-item ${t.type}`;
          item.innerHTML = `
            <div>
              <div style="font-weight: 600;">$${t.amount.toFixed(2)}</div>
              <div style="font-size: 0.8125rem; color: var(--text-muted);">${t.description || 'No description'}</div>
            </div>
            <div style="text-align: right;">
              <div class="category-badge">${t.category?.name || 'Uncategorized'}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">${new Date(t.date).toLocaleDateString()}</div>
            </div>
          `;
          listEl.appendChild(item);
        });
      } catch (err) {
        listEl.innerHTML = '<p style="color: var(--error);">Error loading history.</p>';
      }
    }

    document.getElementById('categoryForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await api.transactions.categories.create({
          name: document.getElementById('catName').value,
          type: document.getElementById('catType').value,
          limit: document.getElementById('catLimit').value
        });
        e.target.reset();
        await loadCategories();
        alert('Category created!');
      } catch (err) {
        alert(err.message || 'Error creating category');
      }
    };

    document.getElementById('transactionForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        amount: Number(document.getElementById('amount').value),
        type: document.getElementById('type').value,
        categoryId: document.getElementById('category').value,
        description: document.getElementById('desc').value,
        date: new Date()
      };

      try {
        const res = await api.transactions.create(data);
        if (res.warning) alert(res.warning);
        else alert('Transaction added!');
        e.target.reset();
        loadHistory();
      } catch (err) {
        alert(err.message || 'Error adding transaction');
      }
    };

    async function handleClearAll() {
      if (!confirm("Are you sure you want to clear all your transactions and custom categories? This cannot be undone.")) return;

      try {
        await api.transactions.clearAll();
        alert('All data cleared successfully!');
        await loadCategories();
        await loadHistory();
      } catch (err) {
        alert(err.message || 'Error clearing data');
      }
    }

    loadCategories();
    loadHistory();
  </script>
</body>
</html>
