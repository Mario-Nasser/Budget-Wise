<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Transactions</title>
  <link rel="icon" type="image/png" href="./assets/images/logo.jpeg">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/addTransaction.css">
</head>
<body>
  <nav>
    <div class="nav-brand">Budget-Wise</div>
    <ul class="nav-links">
      <li><a href="index.html">Financial Goals</a></li>
      <li><a href="addTransaction.html" class="active">Transactions</a></li>
      <li><a href="budgets.html">Budgets</a></li>
      <li><a href="report.html">Reports</a></li>
    </ul>
    <div id="nav-user-info" style="display: flex; gap: 1rem; align-items: center;">
      <span id="nav-user-name" style="color: var(--text-muted); font-size: 0.875rem;"></span>
      <button onclick="handleLogout()" class="btn btn-primary" style="padding: 0.5rem 1rem;">Logout</button>
    </div>
    <div id="nav-toggle">☰</div>
    <div id="navOnMobile">
      <div id="nav-close" style="text-align: right; margin-bottom: 1rem;">X</div>
      <ul id="linksOnMobile">
        <li><a href="index.html">Financial Goals</a></li>
        <li><a href="addTransaction.html" class="active">Transactions</a></li>
        <li><a href="budgets.html">Budgets</a></li>
        <li><a href="report.html">Reports</a></li>
      </ul>
      <div class="mobile-user-info">
        <span id="nav-user-name" style="color: var(--text-muted); font-size: 0.875rem;"></span>
        <button onclick="handleLogout()" class="btn btn-primary">Logout</button>
      </div>
    </div>  
  </nav>

  <div class="container">
    <div class="grid grid-2">
      <!-- Forms Section -->
      <div class="animate-fade-in">
        <!-- Add Category -->
        <div class="glass-card" style="padding: 2rem; margin-bottom: 2rem;">
          <h2 style="margin-bottom: 1.5rem;">Add Category</h2>
          <form id="categoryForm">
            <div class="form-group">
              <label>Category Name</label>
              <input type="text" id="catName" placeholder="e.g. Food" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="catType">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </div>
            <div class="form-group">
              <label>Monthly Spending Limit ($)</label>
              <input type="number" id="catLimit" step="0.01" placeholder="0.00 (Optional)">
              <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Set a monthly limit to receive warnings when you spend too much.</p>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Category</button>
          </form>
        </div>

        <!-- Add Transaction -->
        <div class="glass-card" style="padding: 2rem;">
          <h2 style="margin-bottom: 1.5rem;">New Transaction</h2>
          <form id="transactionForm">
            <div class="form-group">
              <label>Amount ($)</label>
              <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="type" onchange="updateCategories()">
                <option value="Expense">Expense</option>
                <option value="Income">Income</option>
              </select>
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="category" required>
                <option value="">Select Category</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="desc" placeholder="Optional notes">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Transaction</button>
          </form>
        </div>
      </div>

      <!-- History Section -->
      <div class="animate-fade-in" style="animation-delay: 0.1s;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2>Recent History</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button onclick="handleClearAll()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid var(--error);">Clear All Data</button>
            <button onclick="loadHistory()" class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);">Refresh</button>
          </div>
        </div>
        <div id="historyList">
          <p style="color: var(--text-muted);">Loading transactions...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/addTransaction.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
