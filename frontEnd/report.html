<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Reports</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .nav-brand {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #059669, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .chart-container {
      position: relative;
      height: 300px;
      margin-top: 1.5rem;
    }
    .report-toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      align-items: end;
      margin-bottom: 2rem;
    }
    @media (max-width: 768px) {
      .report-toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">Budget-Wise</div>
    <ul class="nav-links">
      <li><a href="index.html">Financial Goals</a></li>
      <li><a href="addTransaction.html">Transactions</a></li>
      <li><a href="budgets.html">Budgets</a></li>
      <li><a href="report.html" class="active">Reports</a></li>
    </ul>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span id="nav-user-name" style="color: var(--text-muted); font-size: 0.875rem;"></span>
      <button onclick="handleLogout()" class="btn btn-primary" style="padding: 0.5rem 1rem;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="glass-card animate-fade-in" style="padding: 2rem; margin-bottom: 2rem;">
      <h2>Report Filters</h2>
      <form id="reportFilters" class="report-toolbar">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="startDate">Start Date</label>
          <input type="date" id="startDate" name="startDate">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label for="endDate">End Date</label>
          <input type="date" id="endDate" name="endDate">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label for="groupBy">Group By</label>
          <select id="groupBy" name="groupBy">
            <option value="day">Day</option>
            <option value="week">Week</option>
            <option value="month" selected>Month</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Generate Report</button>
      </form>
    </div>

    <div class="grid grid-2">
      <!-- Summary Cards -->
      <div class="glass-card animate-fade-in" style="padding: 2rem;">
        <h2>Financial Summary</h2>
        <div id="summaryContent" style="margin-top: 1.5rem;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span>Total Income:</span>
            <span id="totalIncome" style="color: var(--success); font-weight: 700;">$0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span>Total Expenses:</span>
            <span id="totalExpenses" style="color: var(--error); font-weight: 700;">$0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span>Goal Savings:</span>
            <span id="totalGoalSavings" style="color: var(--warning); font-weight: 700;">$0.00</span>
          </div>
          <div style="height: 1px; background: var(--border); margin: 1rem 0;"></div>
          <div style="display: flex; justify-content: space-between; font-size: 1.25rem;">
            <span>Net Balance:</span>
            <span id="netBalance" style="font-weight: 800;">$0.00</span>
          </div>
        </div>
      </div>

      <!-- Expense Chart Section -->
      <div class="glass-card animate-fade-in" style="padding: 2rem; animation-delay: 0.1s;">
        <h2>Spending by Category</h2>
        <div class="chart-container">
          <canvas id="spendingChart"></canvas>
        </div>
      </div>

      <!-- Income Chart Section -->
      <div class="glass-card animate-fade-in" style="padding: 2rem; animation-delay: 0.2s;">
        <h2>Income Breakdown</h2>
        <div class="chart-container">
          <canvas id="incomeChart"></canvas>
        </div>
      </div>

      <!-- Trend Chart Section -->
      <div class="glass-card animate-fade-in" style="padding: 2rem; animation-delay: 0.3s;">
        <h2>Trend Report</h2>
        <div class="chart-container">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Details Table -->
    <div class="glass-card animate-fade-in" style="padding: 2rem; margin-top: 2rem; animation-delay: 0.4s;">
      <h2>Detailed Report</h2>
      <div style="overflow-x: auto; margin-top: 1.5rem;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead>
            <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.875rem;">
              <th style="padding: 1rem;">Date</th>
              <th style="padding: 1rem;">Category</th>
              <th style="padding: 1rem;">Description</th>
              <th style="padding: 1rem; text-align: right;">Amount</th>
            </tr>
          </thead>
          <tbody id="reportTableBody">
            <!-- Rows will be added here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'login.html';

    let spendingChart = null;
    let incomeChart = null;
    let trendChart = null;

    async function loadReport() {
      try {
        const params = {
          pattern: document.getElementById('groupBy').value
        };
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (startDate) params.startDate = startDate;
        if (endDate) params.endDate = endDate;

        const res = await api.reports.get(params);
        const data = res.data;
        let totalGoalSavings = data.summary.totalGoalSavings;
        if (typeof totalGoalSavings !== 'number') {
          const goals = await api.goals.getAll();
          totalGoalSavings = goals.reduce((total, goal) => total + Number(goal.currentAmount || 0), 0);
        }

        // Update Summary
        document.getElementById('totalIncome').textContent = `$${data.summary.totalIncome.toFixed(2)}`;
        document.getElementById('totalExpenses').textContent = `$${data.summary.totalExpenses.toFixed(2)}`;
        document.getElementById('totalGoalSavings').textContent = `$${totalGoalSavings.toFixed(2)}`;
        const balance = data.summary.totalIncome - data.summary.totalExpenses - totalGoalSavings;
        const balanceEl = document.getElementById('netBalance');
        balanceEl.textContent = `$${balance.toFixed(2)}`;
        balanceEl.style.color = balance >= 0 ? 'var(--success)' : 'var(--error)';

        // Update Table
        const tableBody = document.getElementById('reportTableBody');
        tableBody.innerHTML = '';
        if (!data.transactions.length) {
          const row = document.createElement('tr');
          row.innerHTML = '<td colspan="4" style="padding: 1rem; text-align: center; color: var(--text-muted);">No transactions found for this report.</td>';
          tableBody.appendChild(row);
        }
        data.transactions.forEach(t => {
          const row = document.createElement('tr');
          row.style.borderBottom = '1px solid var(--border)';
          row.innerHTML = `
            <td style="padding: 1rem;">${new Date(t.date).toLocaleDateString()}</td>
            <td style="padding: 1rem;"><span class="category-badge">${t.category?.name || 'N/A'}</span></td>
            <td style="padding: 1rem; color: var(--text-muted);">${t.description || '-'}</td>
            <td style="padding: 1rem; text-align: right; font-weight: 600; color: ${t.type === 'Income' ? 'var(--success)' : 'var(--error)'}">
              ${t.type === 'Income' ? '+' : '-'}$${t.amount.toFixed(2)}
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Update Charts
        spendingChart = initDoughnutChart('spendingChart', spendingChart, data.spendingByCategory, ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899']);
        incomeChart = initDoughnutChart('incomeChart', incomeChart, data.incomeByCategory, ['#10b981', '#34d399', '#6ee7b7', '#059669']);

        // Trend Chart
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(trendCtx, {
          type: 'line',
          data: {
            labels: data.spendingPattern.map(p => formatPeriodLabel(p.period)),
            datasets: [{
              label: 'Expenses',
              data: data.spendingPattern.map(p => p.totalSpent),
              borderColor: '#ef4444',
              tension: 0.4,
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
              y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
              x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
            }
          }
        });

      } catch (err) {
        console.error('Error loading report:', err);
      }
    }

    function formatPeriodLabel(period) {
      if (period.day) return `${period.day}/${period.month}/${period.year}`;
      if (period.week) return `Week ${period.week}, ${period.year}`;
      if (period.month) return `${period.month}/${period.year}`;
      return `${period.year}`;
    }

    function initDoughnutChart(id, chartObj, chartData, colors) {
      const ctx = document.getElementById(id).getContext('2d');
      if (chartObj) chartObj.destroy();

      const categories = chartData.map(c => c.category);
      const amounts = chartData.map(c => c.total);

      return new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: categories,
          datasets: [{
            data: amounts,
            backgroundColor: colors,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#94a3b8', padding: 10, font: { size: 10 } }
            }
          }
        }
      });
    }

    document.getElementById('reportFilters').addEventListener('submit', (event) => {
      event.preventDefault();
      loadReport();
    });

    loadReport();
  </script>
</body>
</html>
