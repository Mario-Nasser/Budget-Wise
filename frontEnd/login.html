<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Login</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 3rem;
      text-align: center;
    }
    .brand {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #059669, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }
    .footer-link {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container glass-card animate-fade-in">
    <h1 class="brand">Budget-Wise</h1>
    <p class="subtitle">Welcome back! Please enter your details.</p>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group" style="text-align: left;">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; text-align: left;">
        <input type="checkbox" id="rememberMe" style="width: auto; margin-bottom: 0;">
        <label for="rememberMe" style="margin-bottom: 0;">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Sign In
      </button>
    </form>

    <p class="footer-link">
      Don't have an account? <a href="register.html">Create one for free</a>
    </p>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const alertEl = document.getElementById('alert');

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      alertEl.style.display = 'none';

      try {
        const data = await api.auth.login({ email, password, rememberMe });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        alertEl.textContent = 'Login successful! Redirecting...';
        alertEl.className = 'alert alert-success';
        alertEl.style.display = 'block';

        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        alertEl.textContent = err.message || 'Invalid email or password';
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };
  </script>
</body>
</html>
