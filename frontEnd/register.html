<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget-Wise | Register</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      border-top: 4px solid #4caf50;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; color: #222; }
    .logo span { color: #4caf50; }
    .logo p { color: #888; font-size: 13px; margin-top: 4px; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #4caf50;
      background: #fff;
    }

    .field-error {
      color: #e53935;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    /* Password Strength */
    .strength-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-text {
      font-size: 11px;
      margin-top: 3px;
      min-height: 15px;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn:hover    { background: #43a047; }
    .btn:disabled { background: #a5d6a7; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

    .switch-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #777;
    }
    .switch-link a { color: #4caf50; font-weight: 600; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1><span>Budget</span>-Wise</h1>
      <p>Create your account</p>
    </div>

    <div id="registerAlert" class="alert"></div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your name" />
      <div class="field-error" id="nameErr"></div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="example@email.com" />
      <div class="field-error" id="emailErr"></div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters"
             oninput="updateStrengthBar(this.value)" />
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
      <div class="field-error" id="passwordErr"></div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
      <div class="field-error" id="confirmErr"></div>
    </div>

    <button class="btn" id="registerBtn" data-label="Create Account" onclick="register()">Create Account</button>

    <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
