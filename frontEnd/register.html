<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Register</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .register-container {
      width: 100%;
      max-width: 480px;
      padding: 3rem;
      text-align: center;
    }
    .brand {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #059669, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }
    .footer-link {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="register-container glass-card animate-fade-in">
    <h1 class="brand">Budget-Wise</h1>
    <p class="subtitle">Join thousands of smart spenders today.</p>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
      <div class="form-group" style="text-align: left;">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Create Account
      </button>
    </form>

    <p class="footer-link">
      Already have an account? <a href="login.html">Sign in here</a>
    </p>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const alertEl = document.getElementById('alert');

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alertEl.textContent = 'Passwords do not match';
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';
      alertEl.style.display = 'none';

      try {
        await api.auth.register({ name, email, password, confirmPassword });

        alertEl.textContent = 'Account created successfully! Redirecting to login...';
        alertEl.className = 'alert alert-success';
        alertEl.style.display = 'block';

        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        alertEl.textContent = err.message || 'Something went wrong';
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    };
  </script>
</body>
</html>
