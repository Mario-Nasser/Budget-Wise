<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget-Wise | Dashboard</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .goal-card {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.3s;
    }
    .goal-card:hover {
      transform: translateY(-5px);
    }
    .nav-brand {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #059669, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin: 1rem 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.5s ease-out;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">Budget-Wise</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Financial Goals</a></li>
      <li><a href="addTransaction.html">Transactions</a></li>
      <li><a href="report.html">Reports</a></li>
    </ul>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span id="nav-user-name" style="color: var(--text-muted); font-size: 0.875rem;"></span>
      <button onclick="handleLogout()" class="btn btn-primary" style="padding: 0.5rem 1rem;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="grid grid-2">
      <!-- Create Goal -->
      <div class="glass-card animate-fade-in" style="padding: 2rem; height: fit-content;">
        <h2 style="margin-bottom: 1.5rem;">Create New Goal</h2>
        <div id="alert" class="alert"></div>
        <form id="goalForm">
          <div class="form-group">
            <label for="name">Goal Name</label>
            <input type="text" id="name" placeholder="e.g. New Car" required>
          </div>
          <div class="form-group">
            <label for="target">Target Amount ($)</label>
            <input type="number" id="target" placeholder="5000" required>
          </div>
          <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Goal</button>
        </form>
      </div>

      <!-- Goals List -->
      <div class="animate-fade-in" style="animation-delay: 0.1s;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2>Your Goals</h2>
          <button onclick="loadGoals()" class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);">Refresh</button>
        </div>
        <div id="goalsList">
          <p style="color: var(--text-muted);">Loading your goals...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = 'login.html';

    async function loadGoals() {
      const listEl = document.getElementById('goalsList');
      try {
        const goals = await api.goals.getAll();
        listEl.innerHTML = '';
        
        if (goals.length === 0) {
          listEl.innerHTML = '<p style="color: var(--text-muted);">No goals yet. Create one to get started!</p>';
          return;
        }

        goals.forEach(goal => {
          const progress = (goal.progress || 0);
          const card = document.createElement('div');
          card.className = 'glass-card goal-card';
          card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <h3>${goal.goalName}</h3>
              <span style="font-size: 0.75rem; background: ${goal.isAchieved ? 'var(--success)' : 'var(--primary)'}; padding: 2px 8px; border-radius: 12px; color: white;">
                ${goal.isAchieved ? 'Completed' : 'In Progress'}
              </span>
            </div>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">
              Deadline: ${new Date(goal.deadline).toLocaleDateString()}
            </p>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${Math.min(progress, 100)}%"></div>
            </div>
            <div class="stats">
              <span>$${goal.currentAmount} / $${goal.targetAmount}</span>
              <span>${progress.toFixed(1)}%</span>
            </div>
            <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; align-items: center;">
              <input type="number" id="update-${goal.goalId}" placeholder="Add amount" style="padding: 0.5rem; margin-bottom: 0; flex: 1;">
              <button onclick="updateGoal('${goal.goalId}')" class="btn btn-primary" style="padding: 0.5rem 1rem;">Update</button>
              <button onclick="deleteGoal('${goal.goalId}')" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid var(--error); padding: 0.5rem 0.75rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </div>
          `;
          listEl.appendChild(card);
        });
      } catch (err) {
        listEl.innerHTML = '<p style="color: var(--error);">Error loading goals.</p>';
      }
    }

    document.getElementById('goalForm').onsubmit = async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const data = {
        goalName: document.getElementById('name').value,
        targetAmount: Number(document.getElementById('target').value),
        deadline: document.getElementById('deadline').value
      };

      try {
        await api.goals.create(data);
        alertEl.textContent = 'Goal created successfully!';
        alertEl.className = 'alert alert-success';
        alertEl.style.display = 'block';
        e.target.reset();
        loadGoals();
        setTimeout(() => alertEl.style.display = 'none', 3000);
      } catch (err) {
        alertEl.textContent = err.error || 'Error creating goal';
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
      }
    };

    async function updateGoal(id) {
      const input = document.getElementById(`update-${id}`);
      const amount = Number(input.value);
      if (!amount || amount <= 0) return;

      try {
        await api.goals.updateProgress(id, amount);
        loadGoals();
      } catch (err) {
        alert(err.error || 'Error updating goal');
      }
    }

    async function deleteGoal(id) {
      if (!confirm('Are you sure you want to delete this goal?')) return;
      try {
        await api.goals.delete(id);
        loadGoals();
      } catch (err) {
        alert(err.message || 'Error deleting goal');
      }
    }

    loadGoals();
  </script>
</body>
</html>
